<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="デジタルお絵かき日記">
  <title>My Digital Sketchbook</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gen-interface-jp@0.1.8/cdn/display-400.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="shortcut icon" href="images/favicon.ico">
  <link rel="manifest" href="./manifest.json">
</head>

<body>

  <!-- SVGアイコン定義 -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-add" viewBox="0 0 30 30">
      <path d="M26.25 16.25H16.25V26.25H13.75V16.25H3.75V13.75H13.75V3.75H16.25V13.75H26.25V16.25Z"
        fill="currentColor" />
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path d="M6.4 19L5 17.6L10.6 12L5 6.4L6.4 5L12 10.6L17.6 5L19 6.4L13.4 12L19 17.6L17.6 19L12 13.4L6.4 19Z"
        fill="currentColor" />
    </symbol>
    <symbol id="icon-edit" viewBox="0 0 34 34">
      <path
        d="M8.55645 24.9688C8.62285 24.9688 8.68926 24.9621 8.75566 24.9521L14.3404 23.9727C14.4068 23.9594 14.4699 23.9295 14.5164 23.8797L28.5912 9.80488C28.622 9.77417 28.6464 9.73768 28.6631 9.69751C28.6797 9.65735 28.6883 9.61429 28.6883 9.5708C28.6883 9.52732 28.6797 9.48426 28.6631 9.44409C28.6464 9.40392 28.622 9.36744 28.5912 9.33672L23.0729 3.81504C23.0098 3.75195 22.9268 3.71875 22.8371 3.71875C22.7475 3.71875 22.6645 3.75195 22.6014 3.81504L8.52656 17.8898C8.47676 17.9396 8.44688 17.9994 8.43359 18.0658L7.4541 23.6506C7.4218 23.8285 7.43334 24.0115 7.48773 24.1839C7.54211 24.3563 7.6377 24.5129 7.76621 24.64C7.98535 24.8525 8.26094 24.9688 8.55645 24.9688ZM10.7943 19.1781L22.8371 7.13867L25.2709 9.57246L13.2281 21.6119L10.2764 22.1332L10.7943 19.1781ZM29.2188 27.7578H4.78125C4.19355 27.7578 3.71875 28.2326 3.71875 28.8203V30.0156C3.71875 30.1617 3.83828 30.2812 3.98438 30.2812H30.0156C30.1617 30.2812 30.2812 30.1617 30.2812 30.0156V28.8203C30.2812 28.2326 29.8064 27.7578 29.2188 27.7578Z"
        fill="currentColor" />
    </symbol>
    <symbol id="icon-hamburger" viewBox="0 0 24 24">
      <path d="M3 6H21V8H3V6ZM3 11H21V13H3V11ZM3 16H21V18H3V16Z" fill="currentColor" />
    </symbol>
    <symbol id="icon-totop" viewBox="0 0 35 35">
      <path
        d="M17.5 15.3125L6.5625 26.25L8.09375 27.7813L17.5 18.375L26.9063 27.7813L28.4375 26.25L17.5 15.3125ZM4.375 8.75H30.625V10.9375H4.375V8.75Z"
        fill="currentColor" />
    </symbol>
  </svg>

  <!-- HEADER -->
  <header>
    <a class="logo" href="#" onclick="event.preventDefault(); loadPosts(); setMode('gallery');">My Digital
      Sketchbook</a>
    <div class="mode-toggle">
      <button class="active" id="btnGallery" onclick="setMode('gallery')">Gallery</button>
      <button id="btnDiary" onclick="setMode('diary')">Diary</button>
    </div>
  </header>

  <!-- SP MENU OVERLAY -->
  <div class="sp-menu-overlay" id="spMenuOverlay">
    <div class="sp-menu-panel">
      <div id="spMenuContent"></div>
      <div class="sp-menu-close-row">
        <button class="sp-menu-close" onclick="closeSpMenu()">
          <svg>
            <use href="#icon-close" />
          </svg>
        </button>
      </div>
    </div>
    <div class="sp-backdrop" onclick="closeSpMenu()"></div>
  </div>

  <!-- APP BODY -->
  <div class="app-body">
    <aside id="sidebar">
      <div id="sidebarContent"></div>
    </aside>

    <main>
      <!-- GALLERY VIEW -->
      <div id="gallery-view">
        <div class="gallery-grid" id="galleryGrid"></div>
      </div>

      <!-- DIARY VIEW -->
      <div id="diary-view" style="display:none;">
        <div class="diary-list" id="diaryList"></div>
      </div>

      <!-- ARTICLE VIEW -->
      <div id="article-view">
        <a class="article-back" onclick="closeArticle()">← back</a>
        <div class="article-hero-wrap">
          <div class="article-hero" id="articleHero">
            <img id="articleHeroImg" src="" alt="">
          </div>
        </div>
        <div class="article-body">
          <div class="article-date-row">
            <span class="article-date-num" id="articleDateNum"></span>
            <span class="article-date-day" id="articleDateDay"></span>
          </div>
          <div class="article-title" id="articleTitle"></div>
          <div class="article-content" id="articleContent"></div>
          <div class="article-tags" id="articleTags"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- FAB GROUP -->
  <div class="fab-group" id="fabGroup">
    <!-- 投稿詳細時に動的追加 -->
    <!-- 通常時の固定ボタン -->
    <button class="fab fab-add fab-static" onclick="openAddModal()" title="新規投稿">
      <svg>
        <use href="#icon-add" />
      </svg>
    </button>
    <button class="fab fab-top-pc fab-static" onclick="scrollToTop()" title="トップへ">
      <svg>
        <use href="#icon-totop" />
      </svg>
    </button>
    <button class="fab fab-top-sp fab-static" onclick="scrollToTop()" title="トップへ">
      <svg>
        <use href="#icon-totop" />
      </svg>
    </button>
    <button class="fab fab-hamburger fab-static" onclick="toggleSpMenu()" title="メニュー">
      <svg>
        <use href="#icon-hamburger" />
      </svg>
    </button>
  </div>

  <!-- POST MODAL -->
  <div class="modal-overlay" id="postModalOverlay" onclick="handleModalOverlayClick(event,'postModalOverlay')">
    <div class="post-modal" onclick="event.stopPropagation()">
      <h2 id="postModalTitle">New</h2>
      <div class="form-row">
        <label class="form-label">Title</label>
        <input class="form-input" type="text" id="inputTitle">
      </div>
      <div class="form-row">
        <label class="form-label">Date</label>
        <div class="date-input-wrapper">
          <input type="date" id="inputDate">
          <span class="date-icon">📅</span>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Gallery</label>
        <div>
          <button class="image-upload-btn" onclick="document.getElementById('imageInput').click()">
            <svg id="uploadPlusSvg">
              <use href="#icon-add" />
            </svg>
            <img class="preview-img" id="imagePreview" src="" alt="" style="display:none;">
          </button>
          <input class="image-upload-input" type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Contents</label>
        <textarea class="form-textarea" id="inputContents"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">Tags</label>
        <div class="tags-input-wrapper">
          <div class="tags-display" id="tagsDisplay"></div>
          <input class="form-input" type="text" id="inputTags" placeholder="タグを入力してEnter" autocomplete="off">
          <div class="tag-suggestions" id="tagSuggestions"></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-publish" id="publishBtn" onclick="submitPost()">Publish</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
    <img class="lightbox-img" id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="./script.js"></script>
</body>

</html>
