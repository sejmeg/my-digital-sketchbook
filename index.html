<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Digital Sketchbook</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gen-interface-jp@0.1.8/cdn/display-400.css">
  <style>
    :root {
      --color-bg: #D8D8DA;
      --color-text: #363530;
      --color-sub: #706E64;
      --color-white: #FFFFFF;
      --color-modal-bg: rgba(54, 53, 48, 0.7);
      --sidebar-width: 25vw;
      /* 常に画面幅の25% */
      --header-height: 129px;
      --font: 'Gen Interface JP Display', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      letter-spacing: 0;
    }

    /* ===== HEADER ===== */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--color-bg);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 32px 20px 72px;
      z-index: 100;
      border-bottom: 1px solid var(--color-text);
    }

    .logo {
      font-size: 16px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--color-text);
      text-decoration: none;
    }

    /* トグルボタン外枠: テキストカラー */
    .mode-toggle {
      display: flex;
      border: 1px solid var(--color-text);
      flex-shrink: 0;
    }

    .mode-toggle button {
      background: none;
      border: none;
      padding: 5px 16px;
      font-family: var(--font);
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      color: var(--color-sub);
      letter-spacing: 0;
      transition: background 0.15s, color 0.15s;
    }

    .mode-toggle button.active {
      background: var(--color-white);
      color: var(--color-text);
    }

    /* ===== LAYOUT ===== */
    .app-body {
      display: flex;
      padding-top: var(--header-height);
      min-height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    aside {
      width: var(--sidebar-width);
      /* 25vw: min/maxなし → 常に25% */
      flex-shrink: 0;
      position: fixed;
      top: var(--header-height);
      left: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 32px 20px;
      border-right: 1px solid var(--color-text);
      background: var(--color-bg);
      z-index: 50;
    }

    .sidebar-section {
      margin-bottom: 32px;
    }

    .sidebar-section h2 {
      font-size: 16px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0;
      margin-bottom: 16px;
      color: var(--color-text);
    }

    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      padding-left: 8px;
    }

    .tag-item {
      font-size: 12px;
      color: var(--color-text);
      cursor: pointer;
      padding: 0;
      margin: 0;
      letter-spacing: 0;
      transition: background 0.15s;
    }

    .tag-item:hover,
    .tag-item.active {
      background: var(--color-white);
    }

    .archive-list {
      list-style: none;
      padding-left: 8px;
    }

    .archive-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      margin: 0 0 2px;
      font-size: 12px;
      color: var(--color-text);
      cursor: pointer;
      letter-spacing: 0;
      transition: background 0.15s;
    }

    .archive-item:hover,
    .archive-item.active {
      background: var(--color-white);
    }

    .archive-count {
      font-size: 11px;
    }

    /* ===== MAIN ===== */
    main {
      margin-left: var(--sidebar-width);
      /* 25vwと一致 */
      flex: 1;
      min-width: 0;
      padding: 0 0 80px;
    }

    /* ===== GALLERY ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .gallery-item {
      aspect-ratio: 1/1;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: #ccc;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.03);
    }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(54, 53, 48, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }

    .gallery-overlay span {
      color: var(--color-white);
      font-size: 13px;
      letter-spacing: 0;
    }

    /* ===== DIARY ===== */
    .diary-list {
      display: flex;
      flex-direction: column;
      gap: 80px;
      padding: 40px 0;
    }

    /* PC: テキスト50% / 画像50%、間40px */
    .diary-entry {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      /* text | gap | image */
      grid-template-areas: "content gap image";
      padding: 0 40px;
      position: relative;
      align-items: start;
    }

    .diary-entry-content {
      grid-area: content;
      position: relative;
      /* 編集ボタン用 */
    }

    .diary-entry-gap {
      grid-area: gap;
    }

    /* 40pxスペーサー */

    .diary-date-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 30px;
    }

    .diary-date-num {
      font-size: 32px;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--color-text);
    }

    .diary-date-day {
      font-size: 20px;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--color-text);
    }

    .diary-title {
      font-size: 14px;
      letter-spacing: 0.05em;
      line-height: 1.5;
      margin-bottom: 16px;
      color: var(--color-text);
    }

    .diary-body {
      font-size: 14px;
      letter-spacing: 0.05em;
      line-height: 1.5;
      color: var(--color-text);
      margin-bottom: 16px;
    }

    .diary-tags-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .diary-tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .diary-tag {
      font-size: 12px;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--color-sub);
      cursor: pointer;
    }

    .diary-tag:hover {
      color: var(--color-text);
    }

    /* PC: 編集ボタンはタグ行の右端（テキストエリア内） */
    .diary-edit-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      opacity: 0.6;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .diary-edit-btn:hover {
      opacity: 1;
    }

    .diary-edit-btn svg {
      width: 18px;
      height: 18px;
    }

    .diary-image {
      grid-area: image;
      aspect-ratio: 1/1;
      overflow: hidden;
      cursor: pointer;
    }

    .diary-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== ARTICLE VIEW ===== */
    #article-view {
      display: none;
    }

    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--color-text);
      cursor: pointer;
      padding: 24px 40px 16px;
      text-decoration: none;
      letter-spacing: 0;
      transition: color 0.15s;
    }

    .article-back:hover {
      color: var(--color-sub);
    }

    /* 画像: 左右padding 40px、1:1 */
    .article-hero-wrap {
      padding: 0 40px;
    }

    .article-hero {
      width: 100%;
      aspect-ratio: 1/1;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .article-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .article-body {
      padding: 32px 40px;
    }

    .article-date-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 30px;
    }

    .article-date-num {
      font-size: 32px;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--color-text);
    }

    .article-date-day {
      font-size: 20px;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--color-text);
    }

    .article-title {
      font-size: 14px;
      letter-spacing: 0.05em;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .article-content {
      font-size: 14px;
      letter-spacing: 0.05em;
      line-height: 1.5;
      margin-bottom: 16px;
      color: var(--color-text);
    }

    .article-tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .article-tag {
      font-size: 12px;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--color-sub);
    }

    /* ===== FAB ===== */
    .fab-group {
      position: fixed;
      bottom: 32px;
      right: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 200;
    }

    .fab {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--color-text);
      background: var(--color-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text);
    }

    .fab svg {
      width: 20px;
      height: 20px;
    }

    .fab.fab-add svg {
      width: 22px;
      height: 22px;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-modal-bg);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .post-modal {
      background: var(--color-bg);
      width: 480px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 48px 40px 40px;
    }

    .post-modal h2 {
      text-align: center;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0;
      margin-bottom: 32px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      align-items: start;
      gap: 12px;
      margin-bottom: 20px;
    }

    .form-label {
      font-size: 13px;
      color: var(--color-sub);
      padding-top: 8px;
      letter-spacing: 0;
    }

    .form-input,
    .form-textarea,
    input[type="date"] {
      width: 100%;
      background: var(--color-white);
      border: none;
      outline: none;
      padding: 8px 12px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--color-text);
      letter-spacing: 0;
    }

    .form-textarea {
      padding: 12px;
      resize: vertical;
      min-height: 130px;
    }

    .date-input-wrapper {
      position: relative;
    }

    input[type="date"] {
      padding-right: 36px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .date-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 14px;
      color: var(--color-sub);
    }

    .image-upload-btn {
      width: 120px;
      height: 88px;
      background: var(--color-white);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: var(--color-text);
    }

    .image-upload-btn svg {
      width: 20px;
      height: 20px;
      opacity: 0.4;
    }

    .image-upload-btn img.preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-upload-input {
      display: none;
    }

    .tags-display {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .tag-chip {
      background: var(--color-text);
      color: var(--color-white);
      font-size: 11px;
      padding: 2px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 0;
    }

    .tag-chip-remove {
      cursor: pointer;
      opacity: 0.7;
    }

    .tag-chip-remove:hover {
      opacity: 1;
    }

    .tags-input-wrapper {
      position: relative;
    }

    .tag-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--color-white);
      z-index: 10;
      max-height: 120px;
      overflow-y: auto;
      display: none;
    }

    .tag-suggestions.open {
      display: block;
    }

    .tag-suggestion-item {
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0;
    }

    .tag-suggestion-item:hover {
      background: var(--color-bg);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn-publish {
      background: none;
      border: 1px solid var(--color-text);
      padding: 6px 20px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--color-text);
      cursor: pointer;
      letter-spacing: 0;
      transition: background 0.15s, color 0.15s;
    }

    .btn-publish:hover {
      background: var(--color-text);
      color: var(--color-white);
    }

    /* ===== LIGHTBOX ===== */
    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-modal-bg);
      z-index: 600;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .lightbox-overlay.open {
      display: flex;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      cursor: default;
    }

    /* ===== SP MENU ===== */
    .sp-menu-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
    }

    .sp-menu-overlay.open {
      display: block;
    }

    .sp-menu-panel {
      position: absolute;
      top: var(--header-height);
      left: 0;
      right: 0;
      background: var(--color-bg);
      padding: 24px 20px 40px;
      border-bottom: 1px solid var(--color-text);
    }

    .sp-menu-close-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .sp-menu-close {
      background: none;
      border: 1px solid var(--color-text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-text);
    }

    .sp-menu-close svg {
      width: 14px;
      height: 14px;
    }

    .sp-backdrop {
      position: fixed;
      inset: 0;
      z-index: -1;
    }

    /* ===== PC ONLY ===== */
    @media (min-width: 768px) {

      .fab-top-sp,
      .fab-hamburger {
        display: none;
      }

      /* PC版 diary + article fab: top(PC) を追加 */
    }

    /* ===== TABLET ===== */
    @media (max-width: 1279px) and (min-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* ===== SP ===== */
    @media (max-width: 767px) {
      :root {
        --header-height: 104px;
      }

      /* ロゴ + gap16 + toggle */

      aside {
        display: none;
      }

      main {
        margin-left: 0;
      }

      /* SP header: タイトル（左）とトグル（右）を縦並び、上下32px */
      header {
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
        padding: 32px 24px;
        height: auto;
      }

      .mode-toggle {
        align-self: flex-end;
      }

      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      /* SP diary: 画像→テキストの縦並び */
      .diary-list {
        gap: 40px;
        padding: 24px 0;
      }

      .diary-entry {
        display: flex;
        flex-direction: column;
        padding: 0 16px;
        gap: 0;
      }

      /* SP: 画像を先に */
      .diary-image {
        order: 1;
        width: 100%;
        aspect-ratio: 1/1;
        margin-bottom: 20px;
      }

      .diary-image img {
        height: 100%;
      }

      .diary-entry-content {
        order: 2;
        padding-right: 0;
      }

      .diary-entry-gap {
        display: none;
      }

      .diary-date-num {
        font-size: 24px;
      }

      .diary-date-day {
        font-size: 16px;
      }

      .diary-body {
        line-height: 1.75;
      }

      /* SP: 編集ボタンはタグ行の右端（diary-tags-rowで制御） */

      .article-hero-wrap {
        padding: 0 16px;
      }

      .article-body {
        padding: 20px 16px;
      }

      .article-back {
        padding: 16px 16px 8px;
      }

      .article-date-num {
        font-size: 24px;
      }

      .article-date-day {
        font-size: 16px;
      }

      .article-content,
      .article-title {
        line-height: 1.75;
      }

      .fab-group {
        bottom: 24px;
        right: 16px;
      }

      .fab-top-sp,
      .fab-hamburger {
        display: flex;
      }

      .fab-top-pc {
        display: none;
      }

      .post-modal {
        padding: 32px 20px 28px;
      }

      .form-row {
        grid-template-columns: 72px 1fr;
      }
    }
  </style>
</head>

<body>

    </symbol>
    <symbol id="icon-totop" viewBox="0 0 35 35">
      <path
        d="M17.5 15.3125L6.5625 26.25L8.09375 27.7813L17.5 18.375L26.9063 27.7813L28.4375 26.25L17.5 15.3125ZM4.375 8.75H30.625V10.9375H4.375V8.75Z"
        fill="currentColor" />
    </symbol>
  </svg>

  <!-- HEADER -->
  <header>
    <a class="logo" href="#">My Digital Sketchbook</a>
    <div class="mode-toggle">
      <button class="active" id="btnGallery" onclick="setMode('gallery')">Gallery</button>
      <button id="btnDiary" onclick="setMode('diary')">Diary</button>
    </div>
  </header>

  <!-- SP MENU OVERLAY -->
  <div class="sp-menu-overlay" id="spMenuOverlay">
    <div class="sp-menu-panel">
      <div id="spMenuContent"></div>
      <div class="sp-menu-close-row">
        <button class="sp-menu-close" onclick="closeSpMenu()">
          <svg>
            <use href="#icon-close" />
          </svg>
        </button>
      </div>
    </div>
    <div class="sp-backdrop" onclick="closeSpMenu()"></div>
  </div>

  <!-- APP BODY -->
  <div class="app-body">
    <aside id="sidebar">
      <div id="sidebarContent"></div>
    </aside>

    <main>
      <!-- GALLERY VIEW -->
      <div id="gallery-view">
        <div class="gallery-grid" id="galleryGrid"></div>
      </div>

      <!-- DIARY VIEW -->
      <div id="diary-view" style="display:none;">
        <div class="diary-list" id="diaryList"></div>
      </div>

      <!-- ARTICLE VIEW -->
      <div id="article-view">
        <a class="article-back" onclick="closeArticle()">← back</a>
        <div class="article-hero-wrap">
          <div class="article-hero" id="articleHero">
            <img id="articleHeroImg" src="" alt="">
          </div>
        </div>
        <div class="article-body">
          <div class="article-date-row">
            <span class="article-date-num" id="articleDateNum"></span>
            <span class="article-date-day" id="articleDateDay"></span>
          </div>
          <div class="article-title" id="articleTitle"></div>
          <div class="article-content" id="articleContent"></div>
          <div class="article-tags" id="articleTags"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- FAB GROUP -->
  <div class="fab-group" id="fabGroup">
    <!-- 投稿詳細時に動的追加 -->
    <!-- 通常時の固定ボタン -->
    <button class="fab fab-add fab-static" onclick="openAddModal()" title="新規投稿">
      <svg>
        <use href="#icon-add" />
      </svg>
    </button>
    <button class="fab fab-top-pc fab-static" onclick="scrollToTop()" title="トップへ">
      <svg>
        <use href="#icon-totop" />
      </svg>
    </button>
    <button class="fab fab-top-sp fab-static" onclick="scrollToTop()" title="トップへ">
      <svg>
        <use href="#icon-totop" />
      </svg>
    </button>
    <button class="fab fab-hamburger fab-static" onclick="toggleSpMenu()" title="メニュー">
      <svg>
        <use href="#icon-hamburger" />
      </svg>
    </button>
  </div>

  <!-- POST MODAL -->
  <div class="modal-overlay" id="postModalOverlay" onclick="handleModalOverlayClick(event,'postModalOverlay')">
    <div class="post-modal" onclick="event.stopPropagation()">
      <h2 id="postModalTitle">New</h2>
      <div class="form-row">
        <label class="form-label">Title</label>
        <input class="form-input" type="text" id="inputTitle">
      </div>
      <div class="form-row">
        <label class="form-label">Date</label>
        <div class="date-input-wrapper">
          <input type="date" id="inputDate">
          <span class="date-icon">📅</span>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Gallery</label>
        <div>
          <button class="image-upload-btn" onclick="document.getElementById('imageInput').click()">
            <svg id="uploadPlusSvg">
              <use href="#icon-add" />
            </svg>
            <img class="preview-img" id="imagePreview" src="" alt="" style="display:none;">
          </button>
          <input class="image-upload-input" type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Contents</label>
        <textarea class="form-textarea" id="inputContents"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">Tags</label>
        <div class="tags-input-wrapper">
          <div class="tags-display" id="tagsDisplay"></div>
          <input class="form-input" type="text" id="inputTags" placeholder="タグを入力してEnter" autocomplete="off">
          <div class="tag-suggestions" id="tagSuggestions"></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-publish" id="publishBtn" onclick="submitPost()">Publish</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
    <img class="lightbox-img" id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const SUPABASE_URL = "https://snkiftxdblqlsiyqsdvr.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNua2lmdHhkYmxxbHNpeXFzZHZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTU1ODIsImV4cCI6MjA5NDIzMTU4Mn0.H0tfeBIfP9Kf2JLqsu6dhUUDd8HPmuAIbiTT10DRAc8";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    console.log("supabase connected");

    // ===== DATA =====
    let posts = JSON.parse(localStorage.getItem('sketchbook_posts') || '[]');
    let allTags = JSON.parse(localStorage.getItem('sketchbook_tags') || '[]');

    let currentMode = 'gallery';
    let currentFilter = { type: null, value: null };
    let currentArticleId = null;
    let editingPostId = null;
    let currentTags = [];
    let imageDataUrl = null;

    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    // ===== DEMO DATA =====
    // if (posts.length === 0) {
    //   const imgs = ['sk1', 'sk2', 'sk3', 'sk4', 'sk5'].map(s => `https://picsum.photos/seed/${s}/400/400`);
    //   const tagSets = [['キャラクター', 'ファンアート'], ['風景', 'デジタル'], ['スケッチ'], ['カラー', 'オリジナル'], ['線画']];
    //   const months = ['2026-05', '2026-04', '2026-03', '2026-02', '2026-01'];
    //   let pid = 1;
    //   months.forEach(m => {
    //     for (let d = 1; d <= 5; d++) {
    //       const day = String(d * 2).padStart(2, '0');
    //       posts.push({
    //         id: String(pid++), title: `作品タイトル ${pid - 1}`, date: `${m}-${day}`,
    //         imageUrl: imgs[d - 1],
    //         content: '本文が入ります。本文が入ります。本文が入ります。本文が入ります。本文が入ります。\n\n本文が入ります。本文が入ります。本文が入ります。\n\n本文が入ります。',
    //         tags: tagSets[d - 1]
    //       });
    //       tagSets[d - 1].forEach(t => { if (!allTags.includes(t)) allTags.push(t); });
    //     }
    //   });
    //   savePosts();
    // }

    function savePosts() {
      localStorage.setItem('sketchbook_posts', JSON.stringify(posts));
      localStorage.setItem('sketchbook_tags', JSON.stringify(allTags));
    }

    // ===== FAB GROUP 管理 =====
    // 通常: add + top-pc + top-sp(SP) + hamburger(SP)
    // 投稿詳細: edit + add (static非表示) → dynamic追加
    function showNormalFabs() {
      document.querySelectorAll('.fab-dynamic').forEach(el => el.remove());
      document.querySelectorAll('.fab-static').forEach(el => el.style.display = '');
    }

    function showArticleFabs() {
      document.querySelectorAll('.fab-static').forEach(el => el.style.display = 'none');

      const fabGroup = document.getElementById('fabGroup');

      const editBtn = document.createElement('button');
      editBtn.className = 'fab fab-dynamic';
      editBtn.title = '編集';
      editBtn.innerHTML = '<svg style="width:22px;height:22px"><use href="#icon-edit"/></svg>';
      editBtn.onclick = () => openEditModal(currentArticleId);

      const addBtn = document.createElement('button');
      addBtn.className = 'fab fab-add fab-dynamic';
      addBtn.title = '新規投稿';
      addBtn.innerHTML = '<svg style="width:22px;height:22px"><use href="#icon-add"/></svg>';
      addBtn.onclick = openAddModal;

      fabGroup.prepend(addBtn);
      fabGroup.prepend(editBtn);
    }

    // ===== MODE =====
    function setMode(mode) {
      currentMode = mode;
      currentFilter = { type: null, value: null };
      document.getElementById('btnGallery').className = mode === 'gallery' ? 'active' : '';
      document.getElementById('btnDiary').className = mode === 'diary' ? 'active' : '';
      document.getElementById('gallery-view').style.display = mode === 'gallery' ? 'block' : 'none';
      document.getElementById('diary-view').style.display = mode === 'diary' ? 'block' : 'none';
      document.getElementById('article-view').style.display = 'none';
      showNormalFabs();
      renderSidebar(); renderContent();
    }

    // ===== FILTER =====
    function getFilteredPosts() {
      let f = [...posts].sort((a, b) => b.date.localeCompare(a.date));
      if (currentFilter.type === 'tag') f = f.filter(p => (p.tags || []).includes(currentFilter.value));
      if (currentFilter.type === 'archive') f = f.filter(p => p.date.startsWith(currentFilter.value));
      return f;
    }

    function setFilter(type, value) {
      currentFilter = (currentFilter.type === type && currentFilter.value === value)
        ? { type: null, value: null } : { type, value };
      renderSidebar(); renderContent(); closeSpMenu();
    }

    // ===== SIDEBAR =====
    function getArchives() {
      const map = {};
      posts.forEach(p => { const ym = p.date.slice(0, 7); map[ym] = (map[ym] || 0) + 1; });
      return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
    }

    function getAllTags() {
      const s = new Set();
      posts.forEach(p => (p.tags || []).forEach(t => s.add(t)));
      return [...s];
    }

    function sidebarHTML(mode) {
      const archives = getArchives(), tags = getAllTags();
      const tagHTML = `<div class="sidebar-section"><h2>Tags</h2><div class="tags-list">${tags.map(t => `<span class="tag-item${currentFilter.type === 'tag' && currentFilter.value === t ? ' active' : ''}" onclick="setFilter('tag','${t}')">${t}</span>`).join('')
        }</div></div>`;
      const archHTML = `<div class="sidebar-section"><h2>Archives</h2><ul class="archive-list">${archives.map(([ym, cnt]) => `<li class="archive-item${currentFilter.type === 'archive' && currentFilter.value === ym ? ' active' : ''}" onclick="setFilter('archive','${ym}')"><span>${ym.replace('-', '.')}</span><span class="archive-count">(${cnt})</span></li>`).join('')
        }</ul></div>`;
      return mode === 'gallery' ? tagHTML + archHTML : archHTML + tagHTML;
    }

    function renderSidebar() {
      const html = sidebarHTML(currentMode);
      document.getElementById('sidebarContent').innerHTML = html;
      document.getElementById('spMenuContent').innerHTML = html;
    }

    // ===== GALLERY =====
    function renderGallery() {
      document.getElementById('galleryGrid').innerHTML = getFilteredPosts().map(p =>
        `<div class="gallery-item" onclick="openArticle('${p.id}')">
      <img src="${p.imageUrl || ''}" alt="${p.title}" loading="lazy">
      <div class="gallery-overlay"><span>${p.date.replace(/-/g, '.')}</span></div>
    </div>`
      ).join('');
    }

    // ===== DIARY =====
    function renderDiary() {
      document.getElementById('diaryList').innerHTML = getFilteredPosts().map(p => {
        const d = new Date(p.date);
        return `<div class="diary-entry">
      <div class="diary-entry-content">
        <div class="diary-date-row">
          <span class="diary-date-num">${p.date.replace(/-/g, '.')}</span>
          <span class="diary-date-day">(${DAYS[d.getDay()]})</span>
        </div>
        <div class="diary-title">${p.title}</div>
        <div class="diary-body">${p.content.replace(/\n/g, '<br>')}</div>
        <div class="diary-tags-row">
          <div class="diary-tags">${(p.tags || []).map(t => `<span class="diary-tag">${t}</span>`).join('')}</div>
          <button class="diary-edit-btn" onclick="openEditModal('${p.id}')" title="編集">
            <svg><use href="#icon-edit"/></svg>
          </button>
        </div>
      </div>
      <div class="diary-entry-gap"></div>
      <div class="diary-image" onclick="openLightbox('${p.imageUrl || ''}')">
        <img src="${p.imageUrl || ''}" alt="${p.title}" loading="lazy">
      </div>
    </div>`;
      }).join('');
    }

    function renderContent() {
      if (currentMode === 'gallery') renderGallery(); else renderDiary();
    }

    // ===== ARTICLE =====
    function openArticle(id) {
      const p = posts.find(x => x.id === id); if (!p) return;
      currentArticleId = id;
      const d = new Date(p.date);
      document.getElementById('articleHeroImg').src = p.imageUrl || ``;
      document.getElementById('articleDateNum').textContent = p.date.replace(/-/g, '.');
      document.getElementById('articleDateDay').textContent = `(${DAYS[d.getDay()]})`;
      document.getElementById('articleTitle').textContent = p.title;
      document.getElementById('articleContent').innerHTML = p.content.replace(/\n/g, '<br>');
      document.getElementById('articleTags').innerHTML = (p.tags || []).map(t => `<span class="article-tag">${t}</span>`).join('');

      document.getElementById('gallery-view').style.display = 'none';
      document.getElementById('diary-view').style.display = 'none';
      document.getElementById('article-view').style.display = 'block';
      document.getElementById('articleHero').onclick = () => openLightbox(p.imageUrl || ``);

      showArticleFabs();
    }

    function closeArticle() {
      document.getElementById('article-view').style.display = 'none';
      document.getElementById('gallery-view').style.display = currentMode === 'gallery' ? 'block' : 'none';
      document.getElementById('diary-view').style.display = currentMode === 'diary' ? 'block' : 'none';
      showNormalFabs();
    }

    // ===== LIGHTBOX =====
    function openLightbox(src) {
      if (!src) return;
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightboxOverlay').classList.add('open');
    }
    function closeLightbox() { document.getElementById('lightboxOverlay').classList.remove('open'); }

    // ===== MODAL =====
    function openAddModal() {
      editingPostId = null; currentTags = []; imageDataUrl = null;
      document.getElementById('postModalTitle').textContent = 'New';
      document.getElementById('publishBtn').textContent = 'Publish';
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);
      document.getElementById('inputContents').value = '';
      document.getElementById('inputTags').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('uploadPlusSvg').style.display = 'block';
      renderTagsDisplay();
      document.getElementById('postModalOverlay').classList.add('open');
    }

    function openEditModal(id) {
      const p = posts.find(x => x.id === id); if (!p) return;
      editingPostId = id; currentTags = [...(p.tags || [])]; imageDataUrl = p.imageUrl || null;
      document.getElementById('postModalTitle').textContent = 'Edit';
      document.getElementById('publishBtn').textContent = 'Saved';
      document.getElementById('inputTitle').value = p.title;
      document.getElementById('inputDate').value = p.date;
      document.getElementById('inputContents').value = p.content;
      document.getElementById('inputTags').value = '';
      if (p.imageUrl) {
        document.getElementById('imagePreview').src = p.imageUrl;
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('uploadPlusSvg').style.display = 'none';
      } else {
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('uploadPlusSvg').style.display = 'block';
      }
      renderTagsDisplay();
      document.getElementById('postModalOverlay').classList.add('open');
    }

    function closePostModal() { document.getElementById('postModalOverlay').classList.remove('open'); }
    function handleModalOverlayClick(e, id) { if (e.target.id === id) closePostModal(); }

    async function submitPost() {

      const title = document.getElementById("inputTitle").value;
      const content = document.getElementById("inputContents").value;
      const date = document.getElementById("inputDate").value;

      const file = document.getElementById("imageInput").files[0];

      let imageUrl = "";

      // 画像アップロード
      if (file) {

        const fileName = `${Date.now()}_${file.name}`;

        const { error: uploadError } = await supabaseClient.storage
          .from("images")
          .upload(fileName, file);

        if (uploadError) {
          alert("画像アップロード失敗");
          return;
        }

        const { data } = supabaseClient.storage
          .from("images")
          .getPublicUrl(fileName);

        imageUrl = data.publicUrl;
      }

      // 編集
      if (editingPostId) {

        const { error } = await supabaseClient
          .from("posts")
          .update({
            title: title,
            content: content,
            image_url: imageUrl || imageDataUrl,
            post_date: date,
            tags: currentTags
          })
          .eq("id", editingPostId);

        if (error) {
          console.error(error);
          alert("更新失敗");
          return;
        }

        alert("更新完了");

      } else {

        // 新規投稿
        const { error } = await supabaseClient
          .from("posts")
          .insert([
            {
              title: title,
              content: content,
              image_url: imageUrl,
              post_date: date,
              tags: currentTags
            }
          ]);

        if (error) {
          console.error(error);
          alert("保存失敗");
          return;
        }

        alert("投稿完了");
      }

      await loadPosts();
      closePostModal();
    }

    async function loadPosts() {

      const { data, error } = await supabaseClient
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      // UI用形式へ変換
      posts = data.map(post => ({
        id: String(post.id),
        title: post.title || "",
        date: post.post_date || "",
        imageUrl: post.image_url || "",
        content: post.content || "",
        tags: post.tags || []
      }));

      // タグ一覧再生成
      allTags = [...new Set(
        posts.flatMap(p => p.tags || [])
      )];

      renderSidebar();
      renderContent();
    }

    loadPosts();

    // ===== IMAGE =====
    function previewImage(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        imageDataUrl = ev.target.result;
        document.getElementById('imagePreview').src = imageDataUrl;
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('uploadPlusSvg').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    // ===== TAGS =====
    function renderTagsDisplay() {
      document.getElementById('tagsDisplay').innerHTML = currentTags.map(t =>
        `<span class="tag-chip">${t}<span class="tag-chip-remove" onclick="removeTag('${t}')">×</span></span>`
      ).join('');
    }
    function removeTag(t) { currentTags = currentTags.filter(x => x !== t); renderTagsDisplay(); }

    document.getElementById('inputTags').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = e.target.value.trim().replace(/,$/, '');
        if (val && !currentTags.includes(val)) { currentTags.push(val); renderTagsDisplay(); }
        e.target.value = '';
        document.getElementById('tagSuggestions').classList.remove('open');
      }
    });

    document.getElementById('inputTags').addEventListener('input', e => {
      const val = e.target.value.trim().toLowerCase();
      if (!val) { document.getElementById('tagSuggestions').classList.remove('open'); return; }
      const matches = allTags.filter(t => t.toLowerCase().includes(val) && !currentTags.includes(t));
      if (!matches.length) { document.getElementById('tagSuggestions').classList.remove('open'); return; }
      document.getElementById('tagSuggestions').innerHTML = matches.map(t =>
        `<div class="tag-suggestion-item" onclick="selectTagSuggestion('${t}')">${t}</div>`).join('');
      document.getElementById('tagSuggestions').classList.add('open');
    });

    function selectTagSuggestion(t) {
      if (!currentTags.includes(t)) { currentTags.push(t); renderTagsDisplay(); }
      document.getElementById('inputTags').value = '';
      document.getElementById('tagSuggestions').classList.remove('open');
    }

    // ===== SP MENU =====
    function toggleSpMenu() { document.getElementById('spMenuOverlay').classList.toggle('open'); }
    function closeSpMenu() { document.getElementById('spMenuOverlay').classList.remove('open'); }

    // ===== SCROLL TOP =====
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // ===== BOOT =====
    loadPosts();
  </script>
</body>

</html>
